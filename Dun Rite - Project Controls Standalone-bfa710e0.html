<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dun Rite Construction — Project Controls</title>
  <template id="__bundler_thumbnail" data-bg-color="#0a2540">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#0a2540"/>
      <g transform="translate(600,400)">
        <circle cx="0" cy="0" r="80" fill="#1DB4E8" opacity="0.9"/>
        <text x="0" y="30" font-size="80" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">D</text>
      </g>
      <text x="600" y="700" font-size="32" font-weight="600" fill="white" text-anchor="middle" font-family="Arial">Dun Rite Construction</text>
    </svg>
  </template>
  <style>
/* Design System tokens — DunRite Construction Group */
:root{
  /* Brand palette (from design system) */
  --ds-bg:#080808;
  --ds-white:#f0ede8;
  --ds-gold:#D4AF37;
  --ds-gold-dark:#b8941f;
  --ds-purple:#9B5DE5;
  --ds-dim:rgba(240,237,232,0.45);
  --ds-faint:rgba(240,237,232,0.25);
  --ds-line:rgba(255,255,255,0.07);
  --ds-line2:rgba(255,255,255,0.1);
  
  /* Extended palette */
  --ds-ok:#1E9E6A;
  --ds-warn:#E08A1E;
  --ds-bad:#E0524B;
  
  /* Typography */
  --ds-font-display:'Bebas Neue',sans-serif;
  --ds-font-body:'DM Sans',sans-serif;
  --ds-font-mono:'DM Mono',monospace;
}

/* ============================================================
   Dun Rite Construction — Project Controls
   Design tokens derived from the DunRite logo palette
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');

:root{
  /* Brand */
  --brand-cyan:#1DB4E8;        /* bright logo blue (accent)        */
  --brand-blue:#1583C7;        /* deeper action blue               */
  --brand-blue-700:#0F6BA8;
  --navy:#142130;              /* logo navy (text on light)        */
  --navy-deep:#0E1A28;         /* sidebar base                     */
  --navy-deep-2:#0A1420;       /* sidebar gradient end             */

  /* Neutrals */
  --ink:#16212E;
  --ink-2:#3C4A5A;
  --muted:#6A7889;
  --faint:#9AA7B4;
  --line:#E4E9EE;
  --line-soft:#EEF2F6;
  --paper:#F4F7FA;            /* app background                    */
  --card:#FFFFFF;
  --card-tint:#F8FBFD;

  /* Status */
  --ok:#1E9E6A;  --ok-bg:#E6F6EE;
  --warn:#E08A1E; --warn-bg:#FCF3E2;
  --bad:#E0524B;  --bad-bg:#FBEAE9;
  --idle:#8493A2; --idle-bg:#EEF2F6;

  /* Legacy aliases (used by CRUD views) */
  --err:var(--bad); --success:var(--ok);
  --border:var(--line); --bg:var(--paper); --text:var(--ink); --text-dim:var(--muted);

  /* Effects */
  --r-sm:8px; --r:12px; --r-lg:18px; --r-xl:24px;
  --sh-1:0 1px 2px rgba(16,32,48,.05), 0 1px 1px rgba(16,32,48,.04);
  --sh-2:0 4px 14px rgba(16,32,48,.06), 0 1px 3px rgba(16,32,48,.05);
  --sh-3:0 18px 48px rgba(13,30,48,.14);
  --ring:0 0 0 3px rgba(29,180,232,.28);

  --sidebar-w:264px;
  --topbar-h:68px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Public Sans',system-ui,sans-serif;
  color:var(--ink);
  background:var(--navy-deep);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
#root{height:100%}
button{font-family:inherit;cursor:pointer}
::selection{background:rgba(29,180,232,.25)}

/* tabular numerals everywhere numbers matter */
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
.display{font-family:'Archivo Expanded','Archivo',sans-serif;font-weight:800;letter-spacing:-.01em}
.archivo{font-family:'Archivo',sans-serif}

/* ---------- App frame ---------- */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100%;overflow:hidden}

/* ---------- Sidebar ---------- */
.sidebar{
  background:linear-gradient(180deg,var(--navy-deep),var(--navy-deep-2));
  color:#C5D2DF;display:flex;flex-direction:column;
  border-right:1px solid rgba(255,255,255,.05);
  position:relative;
}
.sidebar__brand{display:flex;align-items:center;gap:12px;padding:22px 22px 18px}
.sidebar__brand img{height:42px;width:auto;display:block}
.sidebar__sect{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#5C6E80;font-weight:700;padding:18px 24px 8px}
.nav{display:flex;flex-direction:column;gap:2px;padding:0 14px}
.nav__item{
  display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  background:transparent;border:0;color:#A9B8C6;
  padding:11px 12px;border-radius:10px;font-size:14.5px;font-weight:500;
  transition:background .15s,color .15s;position:relative;
}
.nav__item svg{width:19px;height:19px;flex:none;stroke-width:1.8}
.nav__item:hover{background:rgba(255,255,255,.05);color:#EAF1F7}
.nav__item.is-active{background:rgba(29,180,232,.14);color:#fff}
.nav__item.is-active::before{
  content:"";position:absolute;left:-14px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;
  background:var(--brand-cyan);box-shadow:0 0 12px rgba(29,180,232,.8);
}
.nav__badge{margin-left:auto;font-size:11px;font-weight:700;background:rgba(255,255,255,.1);color:#cfe; padding:2px 7px;border-radius:20px}
.nav__item.is-active .nav__badge{background:var(--brand-cyan);color:var(--navy-deep)}
.sidebar__foot{margin-top:auto;padding:16px 18px;border-top:1px solid rgba(255,255,255,.06)}
.proj-pill{display:flex;gap:11px;align-items:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);padding:10px 12px;border-radius:12px}
.proj-pill__mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--brand-cyan),var(--brand-blue));display:grid;place-items:center;color:#fff;font-family:'Archivo';font-weight:800;font-size:13px;flex:none}
.proj-pill__t{font-size:13px;color:#EAF1F7;font-weight:600;line-height:1.25}
.proj-pill__s{font-size:11.5px;color:#7E8EA0}

/* ---------- Main ---------- */
.main{background:var(--paper);overflow-y:auto;height:100%;position:relative}
.topbar{
  height:var(--topbar-h);position:sticky;top:0;z-index:20;
  background:rgba(244,247,250,.82);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:18px;padding:0 32px;
}
.crumb{display:flex;align-items:center;gap:9px;color:var(--muted);font-size:13.5px;font-weight:500}
.crumb b{color:var(--ink);font-weight:700}
.crumb svg{width:15px;height:15px;color:var(--faint)}
.topbar__spacer{flex:1}
.search{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 13px;width:300px;color:var(--muted)}
.search input{border:0;outline:0;font:inherit;font-size:13.5px;color:var(--ink);width:100%;background:transparent}
.search svg{width:16px;height:16px;flex:none}
.icon-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;color:var(--ink-2);position:relative}
.icon-btn:hover{border-color:var(--brand-cyan);color:var(--brand-blue)}
.icon-btn svg{width:18px;height:18px}
.icon-btn .dot{position:absolute;top:9px;right:10px;width:7px;height:7px;border-radius:50%;background:var(--bad);border:2px solid #fff}
.avatar{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--navy),#26425f);color:#fff;display:grid;place-items:center;font-family:'Archivo';font-weight:700;font-size:14px}

.page{padding:30px 32px 64px;max-width:1320px;margin:0 auto}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.page-head h1{font-family:'Archivo';font-weight:800;font-size:30px;letter-spacing:-.025em;color:var(--ink);line-height:1.08}
.page-head .sub{color:var(--muted);font-size:14px;margin-top:6px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.page-head .sub .chip{display:inline-flex;align-items:center;gap:6px}
.page-head .sub svg{width:15px;height:15px;color:var(--brand-blue)}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:8px;border-radius:10px;font-weight:600;font-size:13.5px;padding:10px 16px;border:1px solid transparent;transition:.15s;white-space:nowrap}
.btn svg{width:16px;height:16px}
.btn--primary{background:var(--brand-blue);color:#fff;box-shadow:0 1px 2px rgba(21,131,199,.4)}
.btn--primary:hover{background:var(--brand-blue-700)}
.btn--ghost{background:#fff;color:var(--ink-2);border-color:var(--line)}
.btn--ghost:hover{border-color:var(--brand-cyan);color:var(--brand-blue)}

/* ---------- Cards ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-1)}
.card__h{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 20px 0}
.card__h h3{font-family:'Archivo';font-weight:700;font-size:15.5px;color:var(--ink);letter-spacing:-.01em}
.card__h .meta{font-size:12.5px;color:var(--muted);font-weight:600}

/* ---------- Grids ---------- */
.grid{display:grid;gap:20px}
.kpis{grid-template-columns:repeat(4,1fr)}
.cols-2-1{grid-template-columns:1.55fr 1fr}
.cols-2{grid-template-columns:1fr 1fr}
@media(max-width:1080px){.kpis{grid-template-columns:repeat(2,1fr)}.cols-2-1,.cols-2{grid-template-columns:1fr}}

/* ---------- KPI card ---------- */
.kpi{padding:18px 18px 16px;position:relative;overflow:hidden}
.kpi__top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.kpi__ico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:none}
.kpi__ico svg{width:18px;height:18px}
.kpi__label{font-size:12.5px;color:var(--muted);font-weight:600;letter-spacing:.01em}
.kpi__val{font-family:'Archivo Expanded','Archivo';font-weight:800;font-size:30px;letter-spacing:-.02em;color:var(--ink);line-height:1}
.kpi__sub{display:flex;align-items:center;gap:6px;margin-top:9px;font-size:12.5px;font-weight:600;color:var(--muted)}
.delta{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:11.5px;font-weight:700}
.delta svg{width:12px;height:12px}
.delta--up{background:var(--ok-bg);color:var(--ok)}
.delta--down{background:var(--bad-bg);color:var(--bad)}
.delta--flat{background:var(--idle-bg);color:var(--idle)}

/* ---------- Status pill ---------- */
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.01em}
.pill::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}
.pill--ok{background:var(--ok-bg);color:var(--ok)}
.pill--warn{background:var(--warn-bg);color:var(--warn)}
.pill--bad{background:var(--bad-bg);color:var(--bad)}
.pill--idle{background:var(--idle-bg);color:var(--idle)}

/* ---------- Milestone timeline ---------- */
.mstones{padding:8px 20px 18px}
.mrow{display:grid;grid-template-columns:30px 1fr auto;gap:14px;align-items:center;padding:13px 0;border-bottom:1px solid var(--line-soft)}
.mrow:last-child{border-bottom:0}
.mnum{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-family:'Archivo';font-weight:700;font-size:13px;flex:none;border:2px solid var(--line)}
.mrow.done .mnum{background:var(--ok);color:#fff;border-color:var(--ok)}
.mrow.active .mnum{background:var(--warn);color:#fff;border-color:var(--warn);box-shadow:0 0 0 4px var(--warn-bg)}
.mrow.next .mnum{background:#fff;color:var(--faint)}
.mtitle{font-weight:600;font-size:14.5px;color:var(--ink)}
.mdates{font-size:12.5px;color:var(--muted);margin-top:2px;display:flex;gap:12px;flex-wrap:wrap}
.mdates b{color:var(--ink-2);font-weight:600}

/* ---------- Donut / progress ---------- */
.donut-wrap{display:flex;align-items:center;gap:22px;padding:16px 20px 20px}
.donut{position:relative;flex:none}
.donut__center{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
.donut__center .n{font-family:'Archivo Expanded','Archivo';font-weight:800;font-size:30px;color:var(--ink);line-height:1}
.donut__center .l{font-size:11px;color:var(--muted);font-weight:600;margin-top:3px}
.legend{display:flex;flex-direction:column;gap:11px;flex:1}
.legend__row{display:flex;align-items:center;gap:10px;font-size:13px}
.legend__sw{width:11px;height:11px;border-radius:3px;flex:none}
.legend__row .v{margin-left:auto;font-weight:700;color:var(--ink)}
.legend__row .k{color:var(--ink-2);font-weight:500}

/* ---------- Tables ---------- */
.tablecard{overflow:hidden}
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl thead th{
  text-align:left;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);
  font-weight:700;padding:13px 18px;background:var(--card-tint);border-bottom:1px solid var(--line);position:sticky;top:0
}
.tbl tbody td{padding:13px 18px;border-bottom:1px solid var(--line-soft);color:var(--ink-2)}
.tbl tbody tr:last-child td{border-bottom:0}
.tbl tbody tr:hover{background:var(--card-tint)}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums;color:var(--ink);font-weight:600}
.tbl .code{font-family:'Archivo';font-weight:700;color:var(--navy);font-size:12.5px}
.tbl .strong{color:var(--ink);font-weight:600}
.tbl tr.div td{background:#F0F5FA;font-family:'Archivo';font-weight:800;color:var(--navy);font-size:12.5px;letter-spacing:.02em;text-transform:uppercase}
.bar-mini{height:7px;border-radius:6px;background:var(--line);overflow:hidden;min-width:90px}
.bar-mini i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--brand-blue),var(--brand-cyan))}

/* ---------- Gantt ---------- */
.gantt{padding:6px 12px 18px}
.gantt__head{display:grid;grid-template-columns:230px 1fr;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:2}
.gantt__months{display:flex}
.gantt__month{flex:1;text-align:center;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:10px 0;border-left:1px solid var(--line-soft)}
.gantt__row{display:grid;grid-template-columns:230px 1fr;align-items:center;min-height:46px;border-bottom:1px solid var(--line-soft)}
.gantt__row:hover{background:var(--card-tint)}
.gantt__label{padding:8px 16px 8px 8px;font-size:13.5px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:10px}
.gantt__track{position:relative;height:46px}
.gantt__bar{position:absolute;top:50%;transform:translateY(-50%);height:18px;border-radius:6px;display:flex;align-items:center;min-width:8px}
.gantt__bar.done{background:linear-gradient(90deg,#1E9E6A,#2ab47c)}
.gantt__bar.active{background:linear-gradient(90deg,var(--warn),#f0ad4e)}
.gantt__bar.next{background:repeating-linear-gradient(45deg,#cdd8e2,#cdd8e2 5px,#dbe4ec 5px,#dbe4ec 10px)}
.gantt__today{position:absolute;top:0;bottom:0;width:2px;background:var(--brand-cyan);z-index:3}
.gantt__today::after{content:"TODAY";position:absolute;top:-2px;left:4px;font-size:9px;font-weight:800;color:var(--brand-blue);letter-spacing:.05em}

/* ---------- Schedule Gantt (sg) ---------- */
.sg{border-top:1px solid var(--line-soft);overflow-x:auto}
.sg__head{display:grid;align-items:stretch;border-bottom:1px solid var(--line);background:#F7FAFC;position:sticky;top:0;z-index:2}
.sg__corner{padding:11px 16px;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;border-right:1px solid var(--line);display:flex;align-items:center}
.sg__months{display:flex;position:relative}
.sg__mon{flex:none;padding:11px 10px;font-size:11.5px;font-weight:800;color:var(--muted);border-right:1px solid var(--line-soft);text-transform:uppercase;letter-spacing:.05em}
.sg__row{display:grid;align-items:center;border-bottom:1px solid var(--line-soft)}
.sg__row:hover{background:var(--card-tint)}
.sg__label{display:flex;align-items:center;gap:11px;padding:7px 16px;border-right:1px solid var(--line);min-height:44px}
.sg__dot{width:9px;height:9px;border-radius:3px;flex:none;margin-top:1px}
.sg__name{font-size:12.5px;font-weight:700;color:var(--ink);line-height:1.2}
.sg__code{font-size:10.5px;color:var(--faint);font-weight:700;margin-top:2px;letter-spacing:.02em}
.sg__track{position:relative;height:44px}
.sg__grid{position:absolute;top:0;bottom:0;width:1px;background:var(--line-soft)}
.sg__bar{position:absolute;top:10px;height:24px;border-radius:7px;display:flex;align-items:center;padding:0 9px;font-size:11px;font-weight:800;min-width:8px;overflow:hidden;border:1.5px solid transparent;box-sizing:border-box}
.sg__bar.is-aw{box-shadow:0 1px 3px rgba(20,33,48,.22)}
.sg__bar:not(.is-aw){background:#EFF3F8;border-style:dashed}
.sg__barlbl{white-space:nowrap}
.sg__legend{display:flex;flex-wrap:wrap;gap:14px;padding:14px 18px;border-top:1px solid var(--line-soft);font-size:12px;font-weight:700;color:var(--muted)}
.sg__lg{display:inline-flex;align-items:center;gap:7px}
.sg__sw{width:13px;height:13px;border-radius:4px;display:inline-block;flex:none}

/* ---------- Alerts / list ---------- */
.alist{padding:6px 8px 10px}
.aitem{display:flex;gap:13px;padding:12px;border-radius:12px}
.aitem:hover{background:var(--card-tint)}
.aico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex:none}
.aico svg{width:18px;height:18px}
.aitem .t{font-size:14px;font-weight:600;color:var(--ink)}
.aitem .d{font-size:12.5px;color:var(--muted);margin-top:2px}
.aitem .when{margin-left:auto;font-size:12px;color:var(--faint);white-space:nowrap}

/* progress thin */
.prog{height:9px;border-radius:8px;background:var(--line);overflow:hidden}
.prog i{display:block;height:100%;background:linear-gradient(90deg,var(--brand-blue),var(--brand-cyan))}

.sectionlabel{font-family:'Archivo';font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:6px 2px 2px}

/* ---------- Bids view ---------- */
.view{padding:0}
.pg-grid{display:grid;gap:18px;padding:30px 32px 64px;max-width:1320px;margin:0 auto}
.pg-row{display:grid;gap:18px}
.pg-row.cols-2{grid-template-columns:1fr 1fr}
@media(max-width:1080px){.pg-row.cols-2{grid-template-columns:1fr}}

.kpi--gold{background:linear-gradient(135deg,rgba(208,149,39,.08),rgba(229,197,99,.04));border:1px solid rgba(208,149,39,.12)}
.kpi--gold .kpi__val{color:#D09527}
.kpi--cyan{background:linear-gradient(135deg,rgba(29,180,232,.08),rgba(100,213,255,.04));border:1px solid rgba(29,180,232,.12)}
.kpi--cyan .kpi__val{color:var(--brand-cyan)}
.kpi--warn{background:linear-gradient(135deg,rgba(224,138,30,.08),rgba(255,180,90,.04));border:1px solid rgba(224,138,30,.12)}
.kpi--warn .kpi__val{color:var(--warn)}

.card__badge{font-size:12px;font-weight:600;color:var(--muted)}

.tbl-wrap{max-height:450px;overflow-y:auto}
.btn--sm{padding:6px 10px;font-size:12px}

/* ---------- Login Screen ---------- */
.login-screen{display:grid;place-items:center;height:100vh;background:linear-gradient(135deg,var(--navy-deep),var(--navy-deep-2));padding:20px}
.login-box{background:var(--card);border-radius:var(--r-lg);padding:40px;max-width:380px;width:100%;box-shadow:var(--sh-3)}

.login-logo{text-align:center;margin-bottom:24px}
.login-logo img{height:50px;width:auto;display:block;margin:0 auto}

.login-screen h1{font-family:'Archivo';font-weight:800;font-size:24px;color:var(--ink);text-align:center;margin-bottom:6px}
.login-sub{color:var(--muted);text-align:center;font-size:14px;margin-bottom:24px}

.login-form{display:flex;flex-direction:column;gap:16px;margin-bottom:24px}
.login-form label{display:flex;flex-direction:column;gap:8px}
.login-form label>div{font-size:13px;color:var(--ink);font-weight:600}
.login-form input{padding:11px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;outline:0;transition:.15s}
.login-form input:focus{border-color:var(--brand-blue);box-shadow:0 0 0 3px rgba(21,131,199,.1)}
.login-form .err{color:var(--bad);font-size:13px;font-weight:600;padding:8px 12px;background:var(--bad-bg);border-radius:8px}

/* ============================================================
   Change Order workflow + cross-department sync engine
   Admin creates → sent to client → client approves/rejects →
   copies distributed to both parties → budget, schedule &
   dashboard recompute so every department stays in sync.
   ============================================================ */
(function(){
  const D = window.DR;
  const ADMIN_ORG  = 'DunRite Construction Group';
  const CLIENT_ORG = D.project.client || 'Longleaf Development';
  D.parties = {
    admin:  { org:ADMIN_ORG,  email:'mike.rcccon@yahoo.com', name:'Michael Chandler' },
    client: { org:CLIENT_ORG, email:'owner@longleafdev.com', name:'Longleaf Development' }
  };

  // immutable baseline + division snapshot (so re-sync is idempotent)
  D.budget.original = 1350000;
  const divBase = {}; D.divisions.forEach(d => divBase[d.code] = d.budget);
  D.divBaseline = Object.assign({}, divBase);
  const baseMilestone = D.milestones[D.milestones.length-1].sched; // 'Dec 15, 2026'
  const baseActivity  = D.activity.slice();

  // seed: one already-executed CO (visible sync on load) + one out for signature
  D.changeOrders = [
    {id:'CO-001', title:'Upgraded pool-deck pavers', div:'02-900', costImpact:18500, scheduleDays:5,
     reason:'Owner-selected premium travertine in lieu of standard concrete pavers at the amenity deck.',
     status:'executed', createdBy:'Michael Chandler', createdAt:'2026-06-10', sentAt:'2026-06-10',
     decidedAt:'2026-06-12', decidedBy:CLIENT_ORG, clientNote:'Approved — proceed with travertine.',
     executedAt:'2026-06-12', distributed:[ADMIN_ORG, CLIENT_ORG]},
    {id:'CO-002', title:'Add EV charging rough-in (2 stalls)', div:'16-100', costImpact:9400, scheduleDays:3,
     reason:'Owner request to rough-in conduit & panel capacity for two future EV charging stalls.',
     status:'sent', createdBy:'Michael Chandler', createdAt:'2026-06-15', sentAt:'2026-06-15',
     decidedAt:null, decidedBy:null, clientNote:'', executedAt:null, distributed:[]},
  ];

  // pub/sub so the mounted view re-renders the moment data syncs
  const subs = new Set();
  D.bus = { sub:f=>{subs.add(f); return ()=>subs.delete(f);},
            emit:()=>subs.forEach(f=>{ try{f();}catch(e){} }) };

  const fmtDate = d => d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  D.find = id => D.changeOrders.find(o=>o.id===id);
  D.executedCOs    = () => D.changeOrders.filter(o=>o.status==='executed');
  D.coTotal        = () => D.executedCOs().reduce((s,o)=>s+o.costImpact,0);
  D.coDays         = () => D.executedCOs().reduce((s,o)=>s+(o.scheduleDays||0),0);
  D.pendingCOs     = () => D.changeOrders.filter(o=>o.status==='sent').length;
  D.revisedCompletion = () => {
    const base = new Date('2026-12-15T00:00:00');
    base.setDate(base.getDate() + D.coDays());
    return fmtDate(base);
  };

  // Recompute every dependent department from the executed COs
  D.recompute = function(){
    const coTotal = D.coTotal();
    // Budget department
    D.budget.nocis   = coTotal;
    D.budget.current = D.budget.original + coTotal;
    D.budget.remaining = D.budget.current - D.budget.committed;
    // Division cost codes — reset to baseline then re-apply executed COs

    D.executedCOs().forEach(o=>{
      const code = (o.div||'').slice(0,2)+'-000';
      const div = D.divisions.find(x=>x.code===code);
      if(div) div.budget += o.costImpact;
    });
    // Schedule department — shift substantial completion
    const last = D.milestones[D.milestones.length-1];
    last.sched  = D.revisedCompletion();
    last.actual = D.coDays()>0 ? ('+'+D.coDays()+'d') : '—';
    // Dashboard activity feed
    const coActs = D.executedCOs().map(o=>({
      icon:'edit', tone:'ok',
      t:o.id+' executed · synced',
      d:o.title+' · +'+D.usd(o.costImpact),
      when: o.executedAt ? o.executedAt.slice(5) : 'now'
    }));
    D.activity = coActs.concat(baseActivity);
    D.bus.emit();
  };

  // Lifecycle
  D.coCreate = function(data){
    const n = D.changeOrders.length + 1;
    const co = {id:'CO-'+String(n).padStart(3,'0'), status:'draft',
      createdBy:D.parties.admin.name, createdAt:fmtDate(new Date()),
      sentAt:null, decidedAt:null, decidedBy:null, clientNote:'',
      executedAt:null, scheduleDays:0, distributed:[], ...data};
    D.changeOrders.unshift(co);
    D.bus.emit(); return co;
  };
  D.coSend = function(id){
    const o=D.find(id); if(!o) return;
    o.status='sent'; o.sentAt=fmtDate(new Date());
    D.bus.emit();
  };
  // Client decision returns the CO; on approval it auto-distributes & syncs
  D.coDecide = function(id, approved, note){
    const o=D.find(id); if(!o) return;
    o.decidedAt=fmtDate(new Date()); o.decidedBy=D.parties.client.org; o.clientNote=note||'';
    if(approved){
      o.status='executed'; o.executedAt=fmtDate(new Date());
      o.distributed=[D.parties.admin.org, D.parties.client.org];
      D.recompute();              // <-- propagate to every department
    } else {
      o.status='rejected';
      o.distributed=[D.parties.admin.org, D.parties.client.org];
      D.bus.emit();
    }
  };

  D.recompute(); // initial sync from seeded executed CO
})();

  const log = (action, detail, view) => {
    const entry = {
      ts: new Date().toISOString(),
      user: currentUser?.email,
      action,
      detail,
      view
    };
    auditLog.push(entry);
    if(auditLog.length > 500) auditLog = auditLog.slice(-500);
    localStorage.setItem('dr_audit', JSON.stringify(auditLog));
  };

    if(!u) return {ok:false, err:'User not found'};
    currentUser = {email, ...u};
    localStorage.setItem('dr_user', JSON.stringify(currentUser));
    log('LOGIN', `Logged in as ${u.role}`, 'auth');
    return {ok:true, user:currentUser};

  const logout = () => {
    if(currentUser) log('LOGOUT', '', 'auth');
    currentUser = null;
    localStorage.removeItem('dr_user');
    auditLog = [];
    localStorage.removeItem('dr_audit');

  const acceptInvite = (inviteId, email) => {

    if(inv.email !== email) return {ok:false, err:'Email mismatch'};
    if(inv.status !== 'pending') return {ok:false, err:'Invite already used'};
    
    const roleMap = {pm:'Project Manager',super:'Superintendent',finance:'Finance Director',owner:'Principal'};
    USERS[email] = {name:email.split('@')[0], role:inv.role, title:roleMap[inv.role]};
    inv.status = 'accepted';
    invites = invites.map(i=>i.id===inviteId?inv:i);
    localStorage.setItem('dr_invites', JSON.stringify(invites));
    localStorage.setItem('dr_users', JSON.stringify(USERS));
    log('INVITE_ACCEPTED', `${email} accepted invite`, 'admin');
    return {ok:true, user:USERS[email]};
  };

  const getInvites = () => isAdmin() ? invites : [];
  const getUser = () => currentUser;
  const getAudit = () => auditLog;

  return {login, logout, canView, isAdmin, sendInvite, acceptInvite, getInvites, getUser, getAudit, log, USERS};
})();

function Donut({size=132, stroke=20, segments}){
  const r=(size-stroke)/2, C=2*Math.PI*r, total=segments.reduce((a,s)=>a+s.v,0);
  let off=0;
  return (
    React.createElement('svg',{width:size,height:size,viewBox:`0 0 ${size} ${size}`,style:{transform:'rotate(-90deg)'}},
      React.createElement('circle',{cx:size/2,cy:size/2,r,fill:'none',stroke:'#EEF2F6',strokeWidth:stroke}),
      segments.map((s,i)=>{
        const len=s.v/total*C, el=React.createElement('circle',{key:i,cx:size/2,cy:size/2,r,fill:'none',
          stroke:s.c,strokeWidth:stroke,strokeDasharray:`${len} ${C-len}`,strokeDashoffset:-off,
          strokeLinecap:'butt'});
        off+=len; return el;
      })
    )
  );
}

/* Cost Forecasting & Variance Analysis */
function CostForecasting(){
  useSync();
  const D=window.DR;
  const rows=D.divisions.map(d=>{
    const baseline=(D.divBaseline&&D.divBaseline[d.code])!=null?D.divBaseline[d.code]:d.budget;
    const forecast=d.budget;           // revised at-completion (baseline + approved COs)
    const variance=forecast-baseline;  // driven by executed change orders
    return {code:d.code, desc:d.name, baseline, committed:d.committed, forecast, variance};
  });
  const tBase=rows.reduce((s,r)=>s+r.baseline,0);
  const tCommit=rows.reduce((s,r)=>s+r.committed,0);
  const tForecast=rows.reduce((s,r)=>s+r.forecast,0);
  const variance=tForecast-tBase;
  const varPct=tBase?((variance/tBase)*100).toFixed(1):'0.0';

  return React.createElement(LogShell,{title:'Cost Forecasting',
    chips:[{icon:'trend',t:'EAC '+D.usd(tForecast)},{icon:'edit',t:(variance!==0?D.usd(variance)+' from change orders':'On budget')}],
    kpis:[
      {label:'Original Contract',val:D.usdK(tBase),sub:'GMP baseline',icon:'doc',tone:'navy'},
      {label:'Forecast at Completion',val:D.usdK(tForecast),sub:(variance>=0?'+':'')+D.usdK(variance)+' ('+varPct+'%)',icon:'trend',tone:'cyan'},
      {label:'Committed to Date',val:D.usdK(tCommit),sub:(tForecast?Math.round(tCommit/tForecast*100):0)+'% of EAC',icon:'check',tone:'green'},
      {label:'Variance',val:(variance>=0?'+':'')+D.usdK(variance),sub:variance===0?'no overruns':'change orders',icon:'wallet',tone:variance>0?'amber':'green'},
    ]},
    React.createElement(TableCard,{title:'Forecast by Division',meta:'Baseline vs forecast at completion · CSI MasterFormat',
      head:[{t:'Code',w:90},'Division',{t:'Baseline',w:120,r:true},{t:'Committed',w:120,r:true},{t:'Forecast',w:120,r:true},{t:'Variance',w:120,r:true},{t:'Status',w:120}],
      rows:rows.map(r=>React.createElement('tr',{key:r.code+r.desc},
        React.createElement('td',{className:'code'},r.code),
        React.createElement('td',{className:'strong'},r.desc),
        React.createElement('td',{className:'num'},D.usd(r.baseline)),
        React.createElement('td',{className:'num'},D.usd(r.committed)),
        React.createElement('td',{className:'num',style:{fontWeight:700}},D.usd(r.forecast)),
        React.createElement('td',{className:'num',style:{color:r.variance>0?'var(--warn)':'var(--muted)'}},(r.variance>0?'+':'')+D.usd(r.variance)),
        React.createElement('td',null,React.createElement('span',{className:'pill pill--'+(r.variance>0?'warn':'ok')},r.variance>0?'Change Order':'On Budget'))
      )).concat([
        React.createElement('tr',{key:'__tot',className:'div'},
          React.createElement('td',null,''),
          React.createElement('td',null,'Total — Forecast at Completion'),
          React.createElement('td',{className:'num',style:{color:'var(--navy)'}},D.usd(tBase)),
          React.createElement('td',{className:'num',style:{color:'var(--navy)'}},D.usd(tCommit)),
          React.createElement('td',{className:'num',style:{color:'var(--navy)'}},D.usd(tForecast)),
          React.createElement('td',{className:'num',style:{color:'var(--navy)'}},(variance>=0?'+':'')+D.usd(variance)),
          React.createElement('td',null,'')
        )
      ])
    })
  );
}

/* App root */
function App(){
  const user = window.AUTH.getUser();
  const [showAdmin, setShowAdmin] = React.useState(false);
  
  // Not logged in: show login screen
  if(!user) return React.createElement(LoginScreen);

  const [active,setActive]=React.useState(()=>{
    const saved = localStorage.getItem('dr_view') || 'dashboard';
    return window.AUTH.canView(saved) ? saved : 'dashboard';
  });
  const main=React.useRef(null);
  
  const go=(id)=>{
    if(!window.AUTH.canView(id)){
      alert('You do not have access to this section.');
      return;
    }
    setActive(id);
    localStorage.setItem('dr_view',id);
    window.AUTH.log('VIEW', id, id);
    if(main.current) main.current.scrollTop=0;
  };
  React.useEffect(()=>{ window.__go = go; window.__setView = setActive; }, []);

  const View = {
    dashboard:Dashboard, schedule:Schedule, gantt:GanttChart, budget:Budget,
    documents:DocumentManager, daily:DailyReports, issues:IssueTracker, safety:SafetyLog, changeorders:ChangeOrderTracker, invoices:InvoiceManager, equipment:EquipmentTracking, forecasting:CostForecasting, risks:RiskRegister,
    rfi:RfiLog, submittals:SubmittalLog, bids:BidsTracker
  }[active] || Dashboard;

  return React.createElement(React.Fragment,null,
    React.createElement('div',{className:'app'},
      React.createElement(Sidebar,{active,go,user}),
      React.createElement('div',{className:'main',ref:main},
        React.createElement(Topbar,{active,user,showAdmin,setShowAdmin}),
        React.createElement(View,{key:active})
      )
    ),
    showAdmin && React.createElement(AdminInvitePanel,{onClose:()=>setShowAdmin(false)})
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
