<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DunRite — Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Archivo+Expanded:wght@700;800&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Public Sans',system-ui,sans-serif;background:#0E1A28;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  #root{height:100%}
  button{font-family:inherit}
  ::selection{background:rgba(29,180,232,.25)}
  input,textarea{font-family:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(120,140,160,.35);border-radius:8px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-track{background:transparent}
  @keyframes drslide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes drKenBurns{0%{transform:scale(1.06) translate(0,0)}50%{transform:scale(1.13) translate(-1.6%,-1.1%)}100%{transform:scale(1.06) translate(0,0)}}
  @keyframes drZoomIn{from{transform:scale(1.0)}to{transform:scale(1.16)}}
  /* ---- micro-animations ---- */
  @keyframes drViewIn{from{transform:translateY(8px)}to{transform:none}}
  @keyframes drPop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
  @keyframes drRise{from{transform:translateY(12px)}to{transform:none}}
  button{transition:transform .13s cubic-bezier(.34,1.4,.6,1), box-shadow .2s ease, background-color .18s ease, color .16s ease, border-color .18s ease, filter .16s ease}
  button:hover{filter:brightness(1.035)}
  button:active{transform:translateY(1px) scale(.985)}
  a{transition:color .15s ease, background-color .15s ease, opacity .15s ease, transform .13s ease}
  input,select,textarea{transition:border-color .15s ease, box-shadow .15s ease}
  input:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px rgba(29,180,232,.16)}
  .dr-view{animation:drViewIn .34s cubic-bezier(.22,.7,.3,1) both}
  .dr-rise{animation:drRise .4s cubic-bezier(.22,.7,.3,1) both}
  .dr-kpi{transition:transform .2s ease, box-shadow .2s ease}
  .dr-kpi:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(20,33,48,.10)}
  @media (prefers-reduced-motion: reduce){ .dr-kb,.dr-view,.dr-rise{animation:none !important} .dr-kpi:hover{transform:none} button:active{transform:none} }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<rect width="200" height="200" fill="#0E1A28"/>
<rect x="60" y="60" width="80" height="80" rx="14" fill="#1DB4E8"/>
<text x="100" y="100" font-family="Archivo, sans-serif" font-size="42" font-weight="900" fill="#0E1A28" text-anchor="middle" dominant-baseline="central">DR</text>
</svg>
</template>
<div id="root"></div>
<!-- shared data store (plain JS) -->
<script src="os/store.js"></script>
<!-- live sync (optional): Firebase Realtime DB. Stays in local mode until os/sync-config.js is filled in. -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>
<script src="os/sync-config.js"></script>
<script src="os/sync.js"></script>
<!-- one-click connect credentials (Dropbox Chooser + Google Picker) -->
<script src="os/connect-config.js"></script>
<script src="os/sheets.js"></script>
<script src="os/dropbox.js"></script>
<script src="os/microsoft.js"></script>
<script src="os/quickbooks.js"></script>
<script src="os/auth.js"></script>
<!-- email notifications (Cloud Function client) -->

<!-- shared primitives (DRtok, Kpi, Card, Pill, Bar, Avatar, icons, circ) -->

<!-- views -->
<script type="text/babel" src="os/views-home.jsx"></script>
<script type="text/babel" src="os/views-project.jsx"></script>
<script type="text/babel" src="os/views-docs.jsx"></script>
<script type="text/babel" src="os/views-modules.jsx"></script>

<!-- procore-style modules -->

<script type="text/babel" src="os/views-commitments.jsx"></script>
<script type="text/babel" src="os/views-inspections.jsx"></script>
<script type="text/babel" src="os/views-bidding.jsx"></script>
<script type="text/babel" src="os/views-meetings.jsx"></script>
<script type="text/babel" src="os/views-insurance.jsx"></script>
<script type="text/babel" src="os/views-advisor.jsx"></script>
<!-- tweaks panel (host protocol + controls) -->

<!-- shell renders the app -->

</body>
</html>
